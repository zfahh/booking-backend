version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: concert
      POSTGRES_PASSWORD: concert_pass
      POSTGRES_DB: concert_booking
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U concert -d concert_booking']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
